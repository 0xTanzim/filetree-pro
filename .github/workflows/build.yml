name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

env:
  NODE_VERSION: 24.x

jobs:
  # Stage 1: Build and Test
  test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Checkout repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name:  Install dependencies
      run: npm ci

    - name: 🔍 Lint code
      run: npm run lint
      continue-on-error: true

    - name: 🏗️ Compile TypeScript
      run: npm run compile

    - name: ✅ Run tests
      run: npm test

  # Stage 2: Package Extension
  package:
    name: 📦 Package Extension
    runs-on: ubuntu-latest
    needs: test
    # Package on PRs (for testing), main pushes, and releases
    if: |
      github.event_name == 'pull_request' ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'release'
    outputs:
      version: ${{ steps.package-info.outputs.version }}
      vsix-path: ${{ steps.package.outputs.vsix-path }}

    steps:
    - name: 🚀 Checkout repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name:  Install dependencies
      run: npm ci

    - name: 📋 Install vsce globally
      run: npm install -g @vscode/vsce

    - name: 🏗️ Compile TypeScript
      run: npm run compile

    - name: 📋 Get package info
      id: package-info
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "📋 Extension version: ${VERSION}"

    - name: 📦 Package extension
      id: package
      run: |
        vsce package --out filetree-pro-${{ steps.package-info.outputs.version }}.vsix
        VSIX_PATH="filetree-pro-${{ steps.package-info.outputs.version }}.vsix"
        echo "vsix-path=${VSIX_PATH}" >> $GITHUB_OUTPUT
        echo "📦 Generated VSIX: ${VSIX_PATH}"

    - name: 📁 Upload VSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-vsix
        path: "*.vsix"
        retention-days: 10

  # Stage 3: Publish to Marketplaces
  publish:
    name: 🚀 Publish Extension
    runs-on: ubuntu-latest
    needs: [test, package]
    # Only publish on actual GitHub releases (never on PRs or branch pushes)
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production

    steps:
    - name: 🚀 Checkout repository
      uses: actions/checkout@v4

    - name: 🔍 Verify Release Context
      run: |
        echo "🎯 Publishing triggered by release: ${{ github.event.release.tag_name }}"
        echo "📝 Release name: ${{ github.event.release.name }}"
        echo "📦 Package version: ${{ needs.package.outputs.version }}"
        echo "�️ This job only runs on GitHub releases - never on branch pushes!"

    - name: �🛠️ Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 📋 Install publishing tools
      run: |
        npm install -g @vscode/vsce
        npm install -g ovsx
        npm ci

    - name: 📥 Download VSIX artifact
      uses: actions/download-artifact@v4
      with:
        name: extension-vsix
        path: ./

    - name: 🔍 Check version and auto-bump if needed
      id: version-check
      run: |
        set -e

        CURRENT_VERSION="${{ needs.package.outputs.version }}"
        DOWNLOADED_VSIX="${{ needs.package.outputs.vsix-path }}"

        echo "📋 Packaged version: $CURRENT_VERSION"
        echo "📦 Downloaded VSIX:  $DOWNLOADED_VSIX"

        # Query all published versions from VS Code Marketplace (public, no auth needed).
        # If the API is unavailable, PUBLISHED will be empty and we proceed without bumping
        # (same behaviour as before this guard was added).
        PUBLISHED=$(curl -sf -X POST \
          "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=3.0-preview.1" \
          -H "Content-Type: application/json;charset=UTF-8" \
          -H "Accept: application/json;api-version=3.0-preview.1" \
          -d '{"filters":[{"criteria":[{"filterType":7,"value":"0xtanzim.filetree-pro"}]}],"flags":514}' \
          | jq -r '.results[0].extensions[0].versions[].version' 2>/dev/null || echo "")

        if [ -z "$PUBLISHED" ]; then
          echo "ℹ️  No published versions found (new extension or marketplace unavailable) – no bump needed."
        else
          echo "📜 Versions currently on marketplace:"
          echo "$PUBLISHED"
        fi

        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        FINAL_VERSION="$CURRENT_VERSION"
        FINAL_VSIX="$DOWNLOADED_VSIX"

        if echo "$PUBLISHED" | grep -qx "$CURRENT_VERSION"; then
          echo "⚠️  Version $CURRENT_VERSION already exists on the marketplace. Auto-bumping patch..."
          MAX_BUMPS=20
          BUMP_COUNT=0
          while echo "$PUBLISHED" | grep -qx "${MAJOR}.${MINOR}.${PATCH}"; do
            PATCH=$((PATCH + 1))
            BUMP_COUNT=$((BUMP_COUNT + 1))
            if [ "$BUMP_COUNT" -ge "$MAX_BUMPS" ]; then
              echo "❌ Exceeded $MAX_BUMPS bump attempts. Manual intervention required."
              exit 1
            fi
          done
          FINAL_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "🔄 Bumped version: $CURRENT_VERSION → $FINAL_VERSION"

          # Update package.json ephemeral (not committed back to repo)
          npm version "$FINAL_VERSION" --no-git-tag-version

          # Rebuild and repackage with the new version
          npm run build
          vsce package --out "filetree-pro-${FINAL_VERSION}.vsix"
          FINAL_VSIX="filetree-pro-${FINAL_VERSION}.vsix"
          echo "📦 Repackaged VSIX: $FINAL_VSIX"
        else
          echo "✅ Version $CURRENT_VERSION is unique – no bump needed."
        fi

        echo "🎯 Final version : $FINAL_VERSION"
        echo "📦 Final VSIX    : $FINAL_VSIX"
        echo "final-version=${FINAL_VERSION}" >> $GITHUB_OUTPUT
        echo "final-vsix=${FINAL_VSIX}" >> $GITHUB_OUTPUT

    - name: 🏪 Publish to VS Code Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        echo "🏪 Publishing version ${{ steps.version-check.outputs.final-version }} to VS Code Marketplace..."
        vsce publish --packagePath ${{ steps.version-check.outputs.final-vsix }}

    - name: 🌐 Publish to Open VSX Registry
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
      run: |
        echo "🌐 Publishing version ${{ steps.version-check.outputs.final-version }} to Open VSX Registry..."
        ovsx publish ${{ steps.version-check.outputs.final-vsix }} -p $OVSX_PAT

    - name: ✅ Publishing Complete
      run: |
        echo "🎉 Extension published successfully!"
        echo "📦 VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=0xtanzim.filetree-pro"
        echo "🌐 Open VSX Registry: https://open-vsx.org/extension/0xtanzim/filetree-pro"

  # Stage 4: Create Release Asset (for manual releases)
  release-asset:
    name: 📎 Upload Release Asset
    runs-on: ubuntu-latest
    needs: [test, package]
    # Only upload to GitHub releases (never on PRs or branch pushes)
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: 📥 Download VSIX artifact
      uses: actions/download-artifact@v4
      with:
        name: extension-vsix
        path: ./

    - name: 📎 Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ needs.package.outputs.vsix-path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
